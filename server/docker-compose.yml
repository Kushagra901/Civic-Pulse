version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: civicpulse-db
    environment:
      POSTGRES_USER: kushagrasrivastava23
      POSTGRES_PASSWORD: Kush2345
      POSTGRES_DB: civicpulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: civicpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
