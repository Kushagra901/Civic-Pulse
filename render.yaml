services:
  - type: web
    name: civicpulse-api
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd server && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: civicpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: civicpulse-redis
          type: redis
          property: connectionString
      # All other secrets added manually in dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true       # Render generates a random value
      - key: JWT_REFRESH_SECRET
        generateValue: true

  - type: redis
    name: civicpulse-redis
    plan: free
    ipAllowList: []              # Only allow internal connections

databases:
  - name: civicpulse-db
    plan: free
    postgresMajorVersion: 15
