<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ffffff" />
    <title>CivicPulse — Community issue tracking with accountability</title>
    <meta name="description"
      content="Report local issues, track resolutions, and hold civic bodies accountable. Evidence-based credibility scoring. Public audit trail." />

    <!-- Open Graph — controls WhatsApp, Telegram, LinkedIn previews -->
    <meta property="og:title" content="CivicPulse — Local issues, publicly accountable" />
    <meta property="og:description" content="Report broken streetlights, water leaks, and unsafe roads. Track every status change publicly." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://civicpulse.app" />
    <meta property="og:image" content="https://civicpulse.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CivicPulse — Local issues, publicly accountable" />
    <meta name="twitter:description" content="Evidence-based civic issue tracking with a public audit trail." />
    <meta name="twitter:image" content="https://civicpulse.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
