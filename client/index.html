<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── Fonts ────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- ── Primary SEO ──────────────────────────────────────────── -->
    <title>CivicPulse — Local issues, publicly accountable</title>
    <meta name="description"
      content="Report broken streetlights, water leaks, and unsafe roads. Track every status change publicly with evidence-based credibility scoring." />
    <meta name="keywords"
      content="civic tech, community reporting, local issues, municipal complaints, incident tracking, civic engagement" />
    <meta name="author" content="CivicPulse" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://civicpulse.vercel.app/" />

    <!-- ── Open Graph (WhatsApp, Telegram, LinkedIn, Facebook) ───── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="CivicPulse" />
    <meta property="og:title"       content="CivicPulse — Local issues, publicly accountable" />
    <meta property="og:description"
      content="Report local issues, track resolutions, and hold civic bodies accountable with a public, evidence-based audit trail." />
    <meta property="og:url"         content="https://civicpulse.vercel.app/" />
    <meta property="og:image"       content="https://civicpulse.vercel.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="CivicPulse — community incident map and credibility scoring" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X card ─────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="CivicPulse — Local issues, publicly accountable" />
    <meta name="twitter:description"
      content="Evidence-based civic issue tracking with a public audit trail." />
    <meta name="twitter:image"       content="https://civicpulse.vercel.app/og-image.png" />

    <!-- ── Theme & mobile ───────────────────────────────────────── -->
    <meta name="theme-color"               content="#2563eb" />
    <meta name="mobile-web-app-capable"    content="yes" />
    <meta name="apple-mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CivicPulse" />

    <!-- ── Favicon set ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Leaflet dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
